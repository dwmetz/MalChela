SquiblydooRegsvr32:
  title: "Squiblydoo — Regsvr32 Remote Scriptlet Execution"
  id: "lolbin-squiblydoo-001"
  status: "experimental"
  description: "Detects the Squiblydoo technique: regsvr32.exe /s /n /u /i:<URL> scrobj.dll. Executes a remote COM scriptlet (.sct) via scrobj.dll, bypassing AppLocker and application whitelisting. The /i: flag with a URL or UNC path is the key indicator."
