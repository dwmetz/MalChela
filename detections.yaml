HandbuiltHttpRequestTemplate:
  title: "Hand-built raw HTTP request template"
  id: "c2-raw-http-template-001"
  status: "experimental"
  description: "Detects a printf/sprintf-style HTTP/1.0 request-line format string (e.g. 'GET /%s HTTP/1.0') or an unusual compact query-string template (e.g. 'q?s=%s&h=%s'). Malware that talks HTTP over a raw socket instead of a standard HTTP client library (NSURLSession, WinHTTP, libcurl) has to build the request text itself — this is the format-string skeleton left behind by that approach, and doesn't appear in normal use of a standard HTTP library. Found via a macOS backdoor/ransomware sample (EvilQuest/ThiefQuest) constructing its C2 beacon this way. OS-agnostic — the technique isn't platform-specific."
  author: Doug Metz
  date: 2026-07-21
  logsource:
    category: file_event
    product: any
  detection:
    strings:
      - "GET /%s HTTP/1\\.0"
      - "POST /%s HTTP/1\\.0"
      - "q\\?s=%s&h=%s"
  falsepositives:
    - "Minimal embedded/IoT HTTP client implementations that legitimately hand-build requests to avoid a full HTTP library dependency"
  level: high
  tags:
    - attack.t1071.001
  mitre:
    - technique_id: "T1071.001"
      technique_name: "Application Layer Protocol: Web Protocols"
      tactics: ["Command and Control"]

SuspiciousDomainRandom:
  title: "Suspicious domain with random characters"
  id: "d90e5e77-c876-4d2e-b469-9a6a9bb0f5e7"
  status: "experimental"
  description: "Domain containing a mix of letters and digits, characteristic of DGA and randomly-generated C2 domains (e.g. yee9mbi69cm7.com, 4usfliof.net). Requires at least one digit in the domain portion to avoid matching legitimate brand names. Scheme prefix required to avoid Go import path false positives. Optional subdomain prefix (e.g. www.) handled via non-capturing group to correctly match cases like the WannaCry kill switch domain (http://www.iuqerfsodp9...). URL must be cleanly delimited (preceded by whitespace, quote, or start-of-string) to avoid matching URLs embedded mid-blob in Go binary data sections or DGA word lists."
  logsource:
    category: "file_event"
    product: "windows"
  detection:
    strings:
      - "(?:^|[\\s\"'`(])https?://(?:[a-zA-Z0-9-]+\\.)*[a-zA-Z0-9]*[0-9][a-zA-Z0-9]*\\.(com|biz|net|org|info)"
      - "(?:^|[\\s\"'`(])ftp://(?:[a-zA-Z0-9-]+\\.)*[a-zA-Z0-9]*[0-9][a-zA-Z0-9]*\\.(com|biz|net|org|info)"
  tags:
    - attack.t1071.001
  level: high
  mitre:
    - technique_id: "T1071.001"
      technique_name: "Application Layer Protocol: Web Protocols"
      tactics: ["Command and Control"]

