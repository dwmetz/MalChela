SuspiciousURLGeneric:
  title: "Suspicious URL Detection"
  id: "87654321-b98e-3d21-654a-266424710000"
  status: "experimental"
  description: "Detects suspicious URLs in two focused forms: raw IP-address URLs (almost never legitimate in malware strings) and URLs with query string parameters (typical of dynamic C2 beaconing). Intentionally excludes bare domain/path URLs to avoid XML namespace false positives (e.g. schemas.microsoft.com). NOTE: Go binaries embed many internal runtime strings containing colons and slashes that can resemble URL fragments - the IP-form pattern is the more reliable signal of the two."
