    category: "file_event"
    product: "windows"
  detection:
    strings:
      - "regsvr32.*\\/[sSnNuUiI].*http[s]?://"
      - "regsvr32.*scrobj\\.dll"
      - "regsvr32.*/i:http"
  tags:
    - attack.T1218.010
