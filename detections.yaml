SuspiciousDomainRandom:
  title: "Suspicious domain with random characters"
  id: "d90e5e77-c876-4d2e-b469-9a6a9bb0f5e7"
  status: "experimental"
  description: "Domain containing a mix of letters and digits, characteristic of DGA and randomly-generated C2 domains (e.g. yee9mbi69cm7.com, 4usfliof.net). Requires at least one digit in the domain portion to avoid matching legitimate brand names. Scheme prefix required to avoid Go import path false positives. Optional subdomain prefix (e.g. www.) handled via non-capturing group to correctly match cases like the WannaCry kill switch domain (http://www.iuqerfsodp9...)."
  logsource:
    category: "file_event"
    product: "windows"
  detection:
    strings:
      - "https?://(?:[a-zA-Z0-9-]+\\.)*[a-zA-Z0-9]*[0-9][a-zA-Z0-9]*\\.(com|biz|net|org|info)"
      - "ftp://(?:[a-zA-Z0-9-]+\\.)*[a-zA-Z0-9]*[0-9][a-zA-Z0-9]*\\.(com|biz|net|org|info)"
  tags:
    - attack.t1071.001
  level: high
  mitre:
    - technique_id: "T1071.001"
      technique_name: "Application Layer Protocol: Web Protocols"
      tactics: ["Command and Control"]

