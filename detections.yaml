BitcoinAddressP2PKH:
  title: "Hardcoded Bitcoin address (P2PKH/P2SH)"
  id: "ransom-btc-address-001"
  status: "experimental"
  description: "Detects a Base58Check-encoded legacy Bitcoin address (P2PKH, starting '1', or P2SH, starting '3') embedded as a plain string. Ransom notes and extortion payloads commonly hardcode a payment address directly in the binary rather than fetching it from a C2 server, since the demand still needs to display even if C2 is unreachable. Found via a heavily string-obfuscated macOS ransomware/backdoor sample (EvilQuest/ThiefQuest) whose ransom note text itself is encrypted, but the payment address survived in the clear. OS-agnostic — this is not a macOS-specific indicator."
  references:
    - "https://en.bitcoin.it/wiki/Address"
  author: Doug Metz
  date: 2026-07-21
  logsource:
    category: file_event
    product: any
  detection:
    strings:
      - "\\b[13][a-km-zA-HJ-NP-Z1-9]{25,34}\\b"
  falsepositives:
    - "Base58 text that happens to fit the length/charset envelope without being a real address (rare given the length/charset constraints, but not cryptographically verified — no checksum validation is performed)"
  level: high
  tags:
    - attack.t1486
  mitre:
    - technique_id: "T1486"
      technique_name: "Data Encrypted for Impact"
      tactics: ["Impact"]


