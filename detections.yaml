MacLaunchAgentDaemonPersistence:
  title: "macOS LaunchAgent / LaunchDaemon Persistence"
  id: "mac-launchagent-persist-001"
  status: "experimental"
  description: "Detects strings referencing LaunchAgent or LaunchDaemon plist directories and launchctl commands — the primary macOS persistence mechanism. User-level LaunchAgents survive logout; system-level LaunchDaemons persist across reboots."
  logsource:
    category: "file_event"
    product: "macos"
  detection:
    strings:
      - "Library/LaunchAgents/"
      - "Library/LaunchDaemons/"
      - "launchctl\\s+(load|bootstrap|submit|start)"
      - "com\\.apple\\.launchd"
  tags:
    - attack.T1543.001
  level: high
  mitre:
    - technique_id: "T1543.001"
      technique_name: "Create or Modify System Process: Launch Agent"
      tactics: ["Persistence", "Privilege Escalation"]

MacLoginItemPersistence:
  title: "macOS Login Item Persistence"
  id: "mac-loginitem-persist-001"
  status: "experimental"
  description: "Detects SMLoginItemSetEnabled and LSSharedFileList APIs used to register Login Items, and the kLSSharedFileListSessionLoginItems key. Login Items execute at user login and are less visible than LaunchAgents."
  logsource:
    category: "file_event"
    product: "macos"
  detection:
    strings:
      - "SMLoginItemSetEnabled"
      - "kLSSharedFileListSessionLoginItems"
      - "LSSharedFileListInsertItemURL"
  tags:
    - attack.T1547.015
  level: high
  mitre:
    - technique_id: "T1547.015"
      technique_name: "Boot or Logon Autostart Execution: Login Items"
      tactics: ["Persistence", "Privilege Escalation"]

MacShellProfileInjection:
  title: "macOS Shell Profile Injection"
  id: "mac-shellprofile-inject-001"
  status: "experimental"
  description: "Detects references to shell initialization files used for user-level persistence. Writing commands to .zshrc, .bash_profile, or .profile ensures execution on every new shell session."
  logsource:
    category: "file_event"
    product: "macos"
  detection:
    strings:
      - "\\.bash_profile"
      - "\\.zshrc"
      - "\\.bashrc"
      - "\\.zprofile"
      - "\\.profile(?![a-zA-Z0-9_])"
  tags:
    - attack.T1546.004
  level: medium
  mitre:
    - technique_id: "T1546.004"
      technique_name: "Event Triggered Execution: Unix Shell Configuration Modification"
      tactics: ["Persistence", "Privilege Escalation"]

