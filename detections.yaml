MacInMemoryMachOLoading:
  title: "macOS In-Memory Mach-O Loading (dyld NSCreateObjectFileImage)"
  id: "mac-inmem-macho-001"
  status: "experimental"
  description: "Detects debug-assertion strings from Apple's NSCreateObjectFileImageFromMemory implementation (the API used to load and execute a Mach-O image entirely from a memory buffer rather than a file on disk). WorkAroundRadarID4189935 is a literal internal Radar bug-ID comment/assertion string from that dyld code path — its presence in a binary is a strong indicator the sample bundles a copy of it for fileless/reflective Mach-O execution, a documented technique used by EvilQuest/ThiefQuest to run a payload without writing it to disk first."
  references:
    - "https://opensource.apple.com/source/dyld/"
  author: Doug Metz
  date: 2026-07-21
  logsource:
    category: file_event
    product: "macos"
  detection:
    strings:
      - "WorkAroundRadarID4189935"
      - "NSCreateObjectFileImageFromMemory"
  falsepositives:
    - "A legitimate tool that statically links or vendors Apple's open-source dyld loader code for its own purposes (uncommon outside of loader/injection tooling)"
  level: high
  tags:
    - attack.t1620
  mitre:
    - technique_id: "T1620"
      technique_name: "Reflective Code Loading"
      tactics: ["Defense Evasion"]

BellaMacRatSignature:
  title: "Bella macOS RAT signature (Python post-exploitation payload)"
  id: "mac-bella-rat-001"
  status: "experimental"
  description: "Detects internal function/variable names unique to Bella, a publicly available macOS post-exploitation RAT (Python), embedded as a payload. Observed in a Dok/Dokument sample as a ~150KB base64 string decoding to a 2,500+ line Python script with a hardcoded C2 host/port, Chrome saved-password theft, Apple ID phishing, iCloud/Find My iPhone abuse, rogue root CA certificate installation for MITM, and LaunchAgent persistence. These identifiers only exist post-decode — mstrings' base64 auto-decode-and-rescan step (added alongside this rule) is what makes them visible to string matching at all."
  references:
    - "https://github.com/topics/bella-rat"
  author: Doug Metz
  date: 2026-07-21
  logsource:
    category: file_event
    product: "macos"
  detection:
    strings:
      - "bella_version"
      - "create_bella_helpers"
      - "chrome_safe_storage"
      - "appleIDPhish"
  falsepositives: []
  level: high
  tags:
    - attack.t1059.006
  mitre:
    - technique_id: "T1059.006"
      technique_name: "Command and Scripting Interpreter: Python"
      tactics: ["Execution"]

EmbeddedBase64Payload:
  title: "Large embedded base64 blob"
  id: "obfuscation-b64blob-001"
  status: "experimental"
  description: "Detects a single extracted string that is almost entirely a long, unbroken base64-alphabet run (200+ chars) — the shape of an embedded encoded payload (script, executable, config) rather than incidental text. A backstop signal alongside mstrings' base64 auto-decode-and-rescan step: this still fires even when the blob doesn't decode to printable text (e.g. it's encrypted before being base64-encoded) or in any context that only runs detections.yaml pattern matching without the decode step."
  author: Doug Metz
  date: 2026-07-21
  logsource:
    category: file_event
    product: any
  detection:
    strings:
      - "^[A-Za-z0-9+/]{200,}={0,2}$"
  falsepositives:
    - "Long non-encoded alphanumeric identifiers (rare at this length), embedded font/resource data that happens to be base64-alphabet-shaped without being a deliberately encoded payload"
  level: medium
  tags:
    - attack.t1027
  mitre:
    - technique_id: "T1027"
      technique_name: "Obfuscated Files or Information"
      tactics: ["Defense Evasion"]

SelfDecodingBase64Cli:
  title: "Self-decoding via macOS base64 CLI"
  id: "mac-selfdecode-cli-001"
  status: "experimental"
  description: "Detects a format-string invocation of /usr/bin/base64 in decode mode (base64 -i <in> -o <out> -D), shelled out to via NSTask/subprocess rather than decoding natively. A dropper that reveals its real payload this way — instead of a library call like FromBase64String, which would itself be a static string a scanner might flag — is deliberately routing around simpler detection. Observed in a Dok/Dokument sample decoding an embedded Bella RAT payload this way."
  author: Doug Metz
  date: 2026-07-21
  logsource:
    category: file_event
    product: "macos"
  detection:
    strings:
      - "base64 -i %@ -o %@ -D"
      - "base64\\s+-D\\b"
  falsepositives:
    - "Legitimate shell scripts/tools that pipe through base64 -D for benign encoding/decoding needs"
  level: medium
  tags:
    - attack.t1140
  mitre:
    - technique_id: "T1140"
      technique_name: "Deobfuscate/Decode Files or Information"
      tactics: ["Defense Evasion"]

MacKeyloggerKeyNameTable:
  title: "macOS Keylogger Key-Name Table"
  id: "mac-keylogger-keytable-001"
  status: "experimental"
  description: "Detects bracketed human-readable key-name strings ([left-cmd], [caps], [volup], etc.) used to translate captured keycodes/modifier state into readable text before logging or exfiltration — the same table structure documented in EvilQuest/ThiefQuest's keylogging component. Legitimate accessibility/input-remapping software can use similar labels, so this is a heuristic rather than a definitive indicator."
  author: Doug Metz
  date: 2026-07-21
  logsource:
    category: file_event
    product: "macos"
  detection:
    strings:
      - "^\\[(left-cmd|right-cmd|left-shift|right-shift|left-option|right-option|left-ctrl|right-ctrl|caps|volup|voldown|mute|fwddel|pgup|pgdown)\\]$"
  falsepositives:
    - "Accessibility tools, keyboard remapping utilities, or input-testing apps that display the same human-readable key names"
  level: medium
  tags:
    - attack.t1056.001
  mitre:
    - technique_id: "T1056.001"
      technique_name: "Input Capture: Keylogging"
      tactics: ["Collection"]

MacSelfReexecRootEscalation:
  title: "macOS Self Re-Exec Root/Admin Escalation Flags"
  id: "mac-selfreexec-root-001"
  status: "experimental"
  description: "Detects internal CLI control flags a binary passes to itself when re-invoking as root/admin, paired with explicit privilege-requirement messages. EvilQuest/ThiefQuest re-launches itself with hidden flags (observed: --reroot, --noroot, --ignrp) to control its own re-exec/escalation flow rather than using a standard privileged-helper mechanism. Individually thin signals (root-requirement messages are common in legitimate installers), so this is a medium-confidence heuristic — strongest when multiple patterns match the same sample."
  author: Doug Metz
  date: 2026-07-21
  logsource:
    category: file_event
    product: "macos"
  detection:
    strings:
      - "--reroot\\b"
      - "--noroot\\b"
      - "--ignrp\\b"
      - "This application has to be run by root"
      - "This program is designed to run with admin privileges"
  falsepositives:
    - "Legitimate installers/updaters that require root and print a similar message, or CLI tools with coincidentally similar flag names"
  level: medium
  tags:
    - attack.t1548
  mitre:
    - technique_id: "T1548"
      technique_name: "Abuse Elevation Control Mechanism"
      tactics: ["Privilege Escalation"]


